<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="manifest" href="/public/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/public/icon/android-icon-192x192.png" />
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/public/icon/favicon.ico">
	<title>Vyhledávání dopravy</title>
	<style>
		:root {
			--bg: #0f172a;
			--card: rgba(255, 255, 255, 0.08);
			--card-border: rgba(255, 255, 255, 0.12);
			--text: #e2e8f0;
			--muted: #94a3b8;
			--primary: #3b82f6;
			--primary-hover: #2563eb;
			--secondary: #1e293b;
			--secondary-hover: #334155;
			--input-bg: rgba(255, 255, 255, 0.06);
			--table-header: rgba(255, 255, 255, 0.08);
			--row-hover: rgba(255, 255, 255, 0.04);
			--shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
			--radius: 18px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background:
				radial-gradient(circle at top left, #1d4ed8 0%, transparent 30%),
				radial-gradient(circle at bottom right, #0f766e 0%, transparent 25%),
				linear-gradient(135deg, #0f172a 0%, #111827 100%);
			color: var(--text);
			min-height: 100vh;
			padding: 32px 16px;
		}

		.container {
			max-width: 1100px;
			margin: 0 auto;
		}

		.card {
			background: var(--card);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid var(--card-border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 28px;
		}

		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
			margin-bottom: 24px;
		}

		h1 {
			margin: 0;
			font-size: 2rem;
			font-weight: 700;
			letter-spacing: -0.02em;
		}

		.subtitle {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 0.98rem;
		}

		.top-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.btn {
			border: none;
			border-radius: 12px;
			padding: 12px 18px;
			font-size: 0.95rem;
			font-weight: 600;
			cursor: pointer;
			transition: 0.2s ease;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		.btn-primary {
			background: var(--primary);
			color: white;
		}

		.btn-primary:hover {
			background: var(--primary-hover);
			transform: translateY(-1px);
		}

		.btn-secondary {
			background: var(--secondary);
			color: var(--text);
			border: 1px solid rgba(255,255,255,0.08);
		}

		.btn-secondary:hover {
			background: var(--secondary-hover);
			transform: translateY(-1px);
		}

		form {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 18px;
			align-items: end;
			margin-bottom: 28px;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		label {
			font-size: 0.92rem;
			font-weight: 600;
			color: var(--text);
		}

		input {
			width: 100%;
			padding: 13px 14px;
			border-radius: 12px;
			border: 1px solid rgba(255,255,255,0.12);
			background: var(--input-bg);
			color: var(--text);
			font-size: 0.95rem;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
		}

		input::placeholder {
			color: #94a3b8;
		}

		input:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
			background: rgba(255, 255, 255, 0.08);
		}

		.submit-wrap {
			display: flex;
			align-items: end;
		}

		.table-card {
			overflow: hidden;
			border-radius: 16px;
			border: 1px solid rgba(255,255,255,0.1);
			background: rgba(255,255,255,0.03);
		}

		.table-header {
			padding: 16px 18px;
			border-bottom: 1px solid rgba(255,255,255,0.08);
			background: rgba(255,255,255,0.03);
		}

		.table-header h2 {
			margin: 0;
			font-size: 1.05rem;
		}

		.table-wrap {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			min-width: 600px;
		}

		th, td {
			padding: 15px 18px;
			text-align: left;
		}

		th {
			background: var(--table-header);
			color: #cbd5e1;
			font-size: 0.85rem;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			font-weight: 700;
		}

		td {
			border-top: 1px solid rgba(255,255,255,0.06);
			color: var(--text);
		}

		tr:hover td {
			background: var(--row-hover);
		}

		.price {
			font-weight: 700;
			color: #93c5fd;
		}

		@media (max-width: 640px) {
			body {
				padding: 20px 12px;
			}

			.card {
				padding: 20px;
			}

			h1 {
				font-size: 1.55rem;
			}

			.btn {
				width: 100%;
			}

			.top-actions {
				width: 100%;
			}
		}
	</style>
</head>
<body>
    <script>
	if ("serviceWorker" in navigator) {
		window.addEventListener("load", async () => {
			try {
				await navigator.serviceWorker.register("/public/sw.js");
				console.log("Service worker registrován");
			} catch (err) {
				console.error("SW registrace selhala:", err);
			}
		});
	}
    </script>
	<div class="container">
		<div class="card">
			<div class="header">
				<div>
					<h1>Vyhledání dopravy</h1>
					<p class="subtitle">Vyber stát a váhu zásilky, potom zobraz dostupné služby a ceny.</p>
				</div>


			</div>

			<form action="/" method="POST" onsubmit="return validateStateSelection()">
				<div class="form-group">
					<label for="stateInput">Stát</label>
					<input
						list="statesList"
						id="stateInput"
						placeholder="Začni psát název státu..."
						autocomplete="off"
					/>
					<datalist id="statesList">
						{{range .States}}
							<option data-id="{{.ID}}" value="{{.Name}}"></option>
						{{end}}
					</datalist>
					<input type="hidden" name="state" id="stateHidden" />
				</div>

				<div class="form-group">
					<label for="weight">Váha zásilky</label>
					<input
						type="number"
						name="weight"
						id="weight"
						placeholder="Např. 2.5"
						min="0"
						step="0.01"
						required
					/>
				</div>

				<div class="submit-wrap">
					<button type="submit" class="btn btn-primary">Hledat</button>
				</div>
			</form>

			<div class="table-card">
				<div class="table-header">
					<h2>Dostupné služby</h2>
				</div>

				<div class="table-wrap">
					<table>
						<thead>
							<tr>
								<th>Dopravce</th>
								<th>Služba</th>
								<th>Cena</th>
							</tr>
						</thead>
						<tbody>
							{{range .Services}}
								<tr>
									<td>{{.Dopravce}}</td>
									<td>{{.Name}}</td>
									<td class="price">{{.Price}} Kč</td>
								</tr>
							{{end}}
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<script>
		const stateInput = document.getElementById("stateInput");
		const stateHidden = document.getElementById("stateHidden");
		const stateOptions = document.querySelectorAll("#statesList option");

		stateInput.addEventListener("input", function () {
			const selectedValue = this.value;
			let found = false;

			stateOptions.forEach(option => {
				if (option.value === selectedValue) {
					stateHidden.value = option.dataset.id;
					found = true;
				}
			});

			if (!found) {
				stateHidden.value = "";
			}
		});

		function validateStateSelection() {
			if (!stateHidden.value) {
				alert("Vyber platný stát ze seznamu.");
				return false;
			}
			return true;
		}
	</script>
</body>
</html>
